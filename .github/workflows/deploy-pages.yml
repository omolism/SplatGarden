name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; queue new pushes, but don't cancel
# a run that's already deploying.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        # Site is served from the apex custom domain (splatgarden.com),
        # so assets live at the root. The repo also keeps a public/CNAME
        # file with the domain so GitHub Pages knows where to map the
        # build to. If you ever want to fall back to the project page
        # (omolism.github.io/SplatGarden/), flip VITE_BASE back to
        # /SplatGarden/ and remove public/CNAME.
        env:
          VITE_BASE: /
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
